# .github/workflows/deploy.yml
#
# AUTO-DEPLOY PIPELINE
# ─────────────────────
# Triggers on every push to main branch.
# 1. Runs your tests
# 2. If tests pass → Railway auto-deploys the new code
#
# Setup steps:
# 1. Create a free GitHub account at github.com
# 2. Create a new repository (private) called "crypto-trading-bot"
# 3. Push your 4 files to it: git init → git add . → git commit → git push
# 4. Connect Railway to your GitHub repo (Railway dashboard → New Project → GitHub)
# 5. Railway will auto-deploy on every push — no extra config needed

name: Test and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        env:
          # Tests use mock data so no real API keys needed here
          BINANCE_API_KEY: test_key
          BINANCE_API_SECRET: test_secret
          TELEGRAM_TOKEN: test_token
          TELEGRAM_CHAT_ID: "12345"

      - name: Check code style
        run: |
          pip install flake8
          flake8 bot.py model_trainer.py config.py --max-line-length=100 --ignore=E501

  # Railway picks up the push automatically — no deploy step needed here.
  # If you want to trigger a manual redeploy via Railway API, uncomment below:
