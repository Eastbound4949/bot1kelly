  #         curl -X POST https://backboard.railway.app/graphql/v2 \
  #           -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
  #           -H "Content-Type: application/json" \
  #           -d '{"query":"mutation { deploymentCreate(input:{serviceId:\"YOUR_SERVICE_ID\"}) { id } }"}'
